# ---------------------------------------------------------------------------
# Cloudflare Workers + Pages configuration for hookka-erp
#
# Deployment model:
#   - Vite SPA builds to ./dist → deployed to Cloudflare Pages
#   - Hono API runs as a Pages Function under ./functions/api/[[route]].ts
#     (or a separate Worker — see "Alternative" below)
#   - D1 database holds all business data (customers, SOs, POs, etc.)
#
# Local dev:
#   npm run dev         # Vite dev server on 3000 (proxies /api → wrangler)
#   npm run dev:worker  # wrangler dev on 8787 (Workers runtime + D1 local)
# ---------------------------------------------------------------------------

name = "hookka-erp-testing"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Pages project (SPA + Pages Functions)
pages_build_output_dir = "dist"

# D1 database binding — legacy source of truth. Being phased out in favor
# of Supabase behind Hyperdrive (see [[hyperdrive]] below). Routes now go
# through the D1Compat adapter that targets Supabase; the D1 binding is
# retained so fallback / rollback remains one config toggle away until
# Phase 7 retires it.
[[d1_databases]]
binding = "DB"
database_name = "hookka-erp-db"
database_id = "f17f29b5-b511-4824-a476-34767e5d9001"

# Hyperdrive — proxies the Supabase pooler (Singapore) from Workers with
# edge connection pooling. Without this, postgres wire-protocol round trips
# blow through the Workers subrequest budget on the first query.
# Connection string stored on the Hyperdrive config itself (set at creation).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "b0fc9d10217c42bfa793b050d1abed65"

# SESSION_CACHE — KV for per-request hot data.  Primary use: auth session
# lookup (saves ~15ms DB round trip on every authenticated request).  Also
# used by Phase 4 for BOM / SKU / permission cache.
[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "8f4c4b7ac1f142ff8378eada4602458a"

# ---------------------------------------------------------------------------
# TODO: Cron Trigger for dashboard materialized views.
# ---------------------------------------------------------------------------
# `migrations-postgres/9901_dashboard_mat_views.sql` creates 4 MVs that need
# periodic REFRESH.  The endpoint `POST /api/internal/refresh-mvs` (secret-
# gated by CRON_SECRET) triggers the refresh.  WHAT'S MISSING: something
# actually hitting that endpoint on a schedule.
#
# Pages Functions do NOT support `[triggers] crons = [...]` natively
# (scheduled events are Workers-only).  Three options:
#
#   1. Deploy a tiny companion Worker with `[triggers] crons = ["*/5 * * * *"]`
#      whose `scheduled()` handler does:
#        await fetch("https://<prod>/api/internal/refresh-mvs",
#                    { method:"POST", headers:{ "x-cron-secret": env.CRON_SECRET } })
#      This is the CF-native path.
#   2. External cron service (cron-job.org / EasyCron / a GitHub Action on a
#      schedule) POSTing to the refresh endpoint.  Zero infra but an external
#      dependency.
#   3. Invalidate MVs on write (add cache-invalidate calls where SO/PO/JC
#      mutations happen).  Lowest latency, most code touch points.
#
# Until one of the above ships, dashboard tiles will reflect the MV state at
# the last manual refresh — see docs/d1-retirement-plan.md for the runbook.

# Runtime env vars — override per environment (dev/preview/prod) on the
# Cloudflare dashboard or via wrangler secret put.
#
# NOTE: RESEND_API_KEY is intentionally NOT listed here — secrets belong in
# .dev.vars locally and `wrangler secret put <NAME>` in prod.
#
# Phase B.3 / C.6 — Google Workspace OAuth + TOTP 2FA. Required for OAuth
# login to work; until set, /api/auth/oauth/google/start returns 503.
# See docs/AUTH-OAUTH-SETUP.md for the full setup walkthrough.
#   PUBLIC vars (set here or via dashboard):
#     OAUTH_GOOGLE_CLIENT_ID
#     OAUTH_GOOGLE_REDIRECT_URI
#     OAUTH_GOOGLE_HOSTED_DOMAIN     — optional; lock to one Workspace tenant
#   SECRETS (wrangler secret put …):
#     OAUTH_GOOGLE_CLIENT_SECRET
#     JWT_SECRET                     — HMAC secret for OAuth CSRF state token
[vars]
ENVIRONMENT = "production"
API_CORS_ORIGIN = "https://hookka-erp-testing.pages.dev"
APP_URL = "https://hookka-erp-testing.pages.dev"
RESEND_FROM_EMAIL = "Hookka ERP <noreply@houzscentury.com>"
# Uncomment + fill once the Google Cloud Console step is done. Empty values
# keep the OAuth route returning 503 (fails closed, see auth-oauth.ts).
# OAUTH_GOOGLE_CLIENT_ID = ""
# OAUTH_GOOGLE_REDIRECT_URI = "https://hookka-erp-testing.pages.dev/api/auth/oauth/google/callback"
# OAUTH_GOOGLE_HOSTED_DOMAIN = "hookka.com"
