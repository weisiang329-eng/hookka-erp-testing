name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Deploy first so code reaches production before any schema change.
      # For main this hits the production branch; any other branch (e.g.
      # claude/review-xxx) becomes a preview at
      # https://<branch-slug>.hookka-erp-testing.pages.dev.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=hookka-erp-testing --branch=${{ github.ref_name }}

      # Apply D1 migrations after the deploy, only for main. Feature
      # branches share the same D1 so preview pushes must never mutate
      # the production schema. Failure here fails the whole run — schema
      # drift must not slip in silently.
      - name: Apply D1 migrations (production only)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply hookka-erp-db --remote
