name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Apply D1 migrations to the remote database ONLY when deploying main.
      # Feature branches share the same D1 (no preview binding configured)
      # so we deliberately do not mutate production schema from a preview.
      - name: Apply D1 migrations (production only)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply hookka-erp-db --remote

      # Deploy. For main this hits the production branch; for any other
      # branch (e.g. claude/review-xxx) Cloudflare Pages creates a preview
      # deployment at https://<branch-slug>.hookka-erp-testing.pages.dev
      # so you can click through the changes before merging.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=hookka-erp-testing --branch=${{ github.ref_name }}
