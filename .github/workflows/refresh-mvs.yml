name: Refresh Dashboard Materialized Views

# Hits POST /api/internal/refresh-mvs every 15 minutes so the dashboard
# tiles (mv_revenue_by_month, mv_so_summary, dashboard MVs) reflect
# recent activity. Without this, the dashboard freezes on day-1 data
# the moment the system goes live.
#
# The endpoint is idempotent (REFRESH MATERIALIZED VIEW CONCURRENTLY)
# and protected by the same CRON_SECRET + x-cron-secret header pattern
# as qc-cron.yml. The Pages worker rejects with 503 if CRON_SECRET is
# missing on the server side, and 403 if the header doesn't match.
#
# Bootstrap: same as qc-cron.yml — set CRON_SECRET as both a repo
# secret AND a Cloudflare Pages env var, then re-deploy Pages.
on:
  schedule:
    # Every 15 minutes. Cheap (REFRESH ... CONCURRENTLY is non-blocking)
    # and the Pages worker is already warm at this rate.
    - cron: '*/15 * * * *'
  # Manual trigger for ops to force a refresh (e.g. after a backfill).
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/internal/refresh-mvs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is empty. See qc-cron.yml header for setup."
            exit 1
          fi

          # 60s timeout — concurrent MV refresh on a few dashboard MVs
          # typically completes in 2-5s. Cold start can stretch this.
          response=$(curl --silent --show-error --write-out '\nHTTP_STATUS:%{http_code}' \
            --max-time 60 \
            --request POST \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{}' \
            'https://hookka-erp-testing.pages.dev/api/internal/refresh-mvs')

          status=$(echo "$response" | tail -n1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')

          echo "Status: $status"
          echo "Body: $body"

          if [ "$status" -ne 200 ]; then
            echo "::error::refresh-mvs failed with HTTP $status"
            exit 1
          fi
