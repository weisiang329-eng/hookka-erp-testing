# ---------------------------------------------------------------------------
# Cloudflare Workers + Pages configuration for hookka-erp
#
# Deployment model:
#   - Vite SPA builds to ./dist → deployed to Cloudflare Pages
#   - Hono API runs as a Pages Function under ./functions/api/[[route]].ts
#     (or a separate Worker — see "Alternative" below)
#   - Supabase Postgres (via the Hyperdrive binding below) holds all
#     business data — customers, SOs, POs, job cards, inventory, etc.
#     [LEGACY] D1 was the source of truth pre-Phase 7. The binding was
#     retired in commit 7059259 (2026-04-27) and every route now flows
#     through the D1Compat → Postgres adapter wired up in worker.ts.
#
# Local dev:
#   npm run dev         # Vite dev server on 3000 (proxies /api → mock API)
#   npm run dev:worker  # wrangler dev on 8787 (Workers runtime; talks to
#                       # Supabase via DATABASE_URL in .dev.vars)
# ---------------------------------------------------------------------------

name = "hookka-erp-testing"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Pages project (SPA + Pages Functions)
pages_build_output_dir = "dist"

# D1 database binding — REMOVED 2026-04-27 (Phase 7 retire). All reads/
# writes flow through the D1Compat adapter to Supabase Postgres via
# Hyperdrive (see [[hyperdrive]] below). The legacy D1 instance was empty
# and had no live traffic — every route uses `c.var.DB` which is the
# Postgres adapter set in worker.ts middleware. The original D1 database
# (`hookka-erp-db`, id `f17f29b5-b511-4824-a476-34767e5d9001`) still exists
# in Cloudflare for snapshot-based rollback if needed; if you ever need
# to re-bind, copy it back from git history.

# Hyperdrive — proxies the Supabase pooler (Singapore) from Workers with
# edge connection pooling. Without this, postgres wire-protocol round trips
# blow through the Workers subrequest budget on the first query.
# Connection string stored on the Hyperdrive config itself (set at creation).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "b0fc9d10217c42bfa793b050d1abed65"

# SESSION_CACHE — KV for per-request hot data.  Primary use: auth session
# lookup (saves ~15ms DB round trip on every authenticated request).  Also
# used by Phase 4 for BOM / SKU / permission cache.
[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "8f4c4b7ac1f142ff8378eada4602458a"

# ---------------------------------------------------------------------------
# ERP_METRICS — Cloudflare Analytics Engine dataset (Phase 6 / P6.2-P6.3).
# ---------------------------------------------------------------------------
# Sink for per-request timing + per-resource event counters. Writes are
# best-effort — every call site checks `if (env.ERP_METRICS)` before
# dispatching, so when the binding is missing (local dev without an account
# token, or during a rollback) the code simply doesn't emit. Queries run
# from /api/admin/health/kpis (P6.4) via env.ERP_METRICS.query(...).
#
# Schema (see docs/OBSERVABILITY.md for the full spec):
#   indexes:  ["{route}|{status}"]
#   blobs:    [route, status, traceparent, kind?]
#   doubles:  [dur_ms, db_dur_ms, db_count]
#
# Bindings on Pages projects require the Analytics Engine product be
# enabled on the account (free tier covers ~10M events/day). If unavailable,
# leave this commented out — the code path no-ops.
#
# DISABLED 2026-04-26: enabling this binding without enabling Analytics
# Engine on the Cloudflare account caused 30 consecutive CI deploy failures
# ("You need to enable Analytics Engine"). Net effect: prod was running
# stale code from before commit 3de901a AND the post-deploy schema-apply
# step (then `d1 migrations apply --remote`, now removed entirely — see
# 2026-04-27 cleanup commit) was never running. Re-enable AFTER the user
# enables Analytics Engine at https://dash.cloudflare.com → Analytics &
# Logs → Analytics Engine. Until then, observability emits via console
# only (visible via `wrangler pages deployment tail`).
# [[analytics_engine_datasets]]
# binding = "ERP_METRICS"
# dataset = "hookka_erp_metrics"

# ---------------------------------------------------------------------------
# TODO: Cron Trigger for dashboard materialized views.
# ---------------------------------------------------------------------------
# `migrations-postgres/9901_dashboard_mat_views.sql` creates 4 MVs that need
# periodic REFRESH.  The endpoint `POST /api/internal/refresh-mvs` (secret-
# gated by CRON_SECRET) triggers the refresh.  WHAT'S MISSING: something
# actually hitting that endpoint on a schedule.
#
# Pages Functions do NOT support `[triggers] crons = [...]` natively
# (scheduled events are Workers-only).  Three options:
#
#   1. Deploy a tiny companion Worker with `[triggers] crons = ["*/5 * * * *"]`
#      whose `scheduled()` handler does:
#        await fetch("https://<prod>/api/internal/refresh-mvs",
#                    { method:"POST", headers:{ "x-cron-secret": env.CRON_SECRET } })
#      This is the CF-native path.
#   2. External cron service (cron-job.org / EasyCron / a GitHub Action on a
#      schedule) POSTing to the refresh endpoint.  Zero infra but an external
#      dependency.
#   3. Invalidate MVs on write (add cache-invalidate calls where SO/PO/JC
#      mutations happen).  Lowest latency, most code touch points.
#
# Until one of the above ships, dashboard tiles will reflect the MV state at
# the last manual refresh — see migrations-postgres/README.md for the
# Supabase migration flow and docs/d1-retirement-plan.md ([LEGACY] now
# fully executed) for historical context.

# ---------------------------------------------------------------------------
# Phase C #3 quick-win — PO emission queue (scaffold).
# ---------------------------------------------------------------------------
# Bindings stay commented out until the admin provisions the queues:
#   wrangler queues create po-emission
#   wrangler queues create po-emission-dlq
# Then uncomment both blocks and redeploy. Producer code in
# src/api/lib/queue-po-emission.ts auto-detects the binding (gracefully
# falls back to inline notify when missing). Consumer code lives at
# src/api/queues/po-emission-consumer.ts — Pages Functions cannot host a
# queue consumer directly, so the admin will also need a sibling Worker
# to wire `default.queue` → that handler. Full runbook in
# docs/QUEUES-SETUP.md.
#
# [[queues.producers]]
# binding = "PO_EMISSION_QUEUE"
# queue = "po-emission"
#
# [[queues.consumers]]
# queue = "po-emission"
# max_batch_size = 10
# max_batch_timeout = 30
# max_retries = 3
# dead_letter_queue = "po-emission-dlq"

# ---------------------------------------------------------------------------
# Phase B.4 — R2 bucket for invoice PDFs / BOM drawings / SO attachments.
# ---------------------------------------------------------------------------
# Bucket-create runbook:
#   wrangler r2 bucket create hookka-files
# Then uncomment the block below and redeploy. Helper in
# src/api/lib/r2-store.ts raises a clear error when the binding is
# missing, so routes that need files (src/api/routes-d1/files.ts) return
# 503 instead of crashing. Full runbook in docs/R2-SETUP.md.
#
# Sprint 4 — activated. The bucket must already exist (`wrangler r2 bucket
# create hookka-files`) before deploy or the binding fails to attach.
# Routes that need files (src/api/routes/files.ts) call r2-store.ts which
# returns 503 when env.FILES is undefined, so a bucket-not-yet-created
# state degrades gracefully rather than crashing.
[[r2_buckets]]
binding = "FILES"
bucket_name = "hookka-files"

# ---------------------------------------------------------------------------
# Phase C #7 — Daily backup cron trigger (scaffold).
# ---------------------------------------------------------------------------
# Uncomment after the FILES R2 binding is live. Runs the
# src/api/cron/daily-backup.ts handler, which writes a logical dump of
# the Supabase tables to r2://hookka-files/backups/supabase/<date>.json.gz.
# Pages Functions does not support `[triggers] crons`; you'll need to
# move this entry to a sibling Worker project. See docs/DR-RUNBOOK.md.
#
# [triggers]
# crons = ["0 18 * * *"]   # 02:00 SGT daily (UTC+8)

# Runtime env vars — override per environment (dev/preview/prod) on the
# Cloudflare dashboard or via wrangler secret put.
#
# NOTE: RESEND_API_KEY is intentionally NOT listed here — secrets belong in
# .dev.vars locally and `wrangler secret put <NAME>` in prod.
#
# Phase B.3 / C.6 — Google Workspace OAuth + TOTP 2FA. Required for OAuth
# login to work; until set, /api/auth/oauth/google/start returns 503.
# See docs/AUTH-OAUTH-SETUP.md for the full setup walkthrough.
#   PUBLIC vars (set here or via dashboard):
#     OAUTH_GOOGLE_CLIENT_ID
#     OAUTH_GOOGLE_REDIRECT_URI
#     OAUTH_GOOGLE_HOSTED_DOMAIN     — optional; lock to one Workspace tenant
#   SECRETS (wrangler secret put …):
#     OAUTH_GOOGLE_CLIENT_SECRET
#     JWT_SECRET                     — HMAC secret for OAuth CSRF state token
[vars]
ENVIRONMENT = "production"
API_CORS_ORIGIN = "https://hookka-erp-testing.pages.dev"
APP_URL = "https://hookka-erp-testing.pages.dev"
RESEND_FROM_EMAIL = "Hookka Manufacturing ERP <noreply@houzscentury.com>"
# Uncomment + fill once the Google Cloud Console step is done. Empty values
# keep the OAuth route returning 503 (fails closed, see auth-oauth.ts).
# OAUTH_GOOGLE_CLIENT_ID = ""
# OAUTH_GOOGLE_REDIRECT_URI = "https://hookka-erp-testing.pages.dev/api/auth/oauth/google/callback"
# OAUTH_GOOGLE_HOSTED_DOMAIN = "hookka.com"

# Sentry / GlitchTip DSN for worker-side error reporting (Sprint 5).
# Set via `wrangler secret put SENTRY_DSN` in prod, or via .dev.vars locally.
# When unset, app.onError logs to wrangler-tail only. The frontend equivalent
# is VITE_SENTRY_DSN, which Vite statically replaces at build time.
# SENTRY_DSN = ""  # set as a secret, not a public var
