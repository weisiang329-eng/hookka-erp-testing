name: Email Outbox — Drain Cron

# Sprint 4 — fires POST /api/internal/process-email-outbox every 5 min
# (and on demand via workflow_dispatch). The endpoint pulls PENDING /
# RETRYING rows from outbox_emails, calls Resend, and marks status. 3
# retries with exponential backoff before FAILED.
#
# Auth: x-cron-secret header. Same shared secret as qc-cron.yml — set
# CRON_SECRET as a repo secret AND on Cloudflare Pages env so the
# server-side compare succeeds.
#
# To bootstrap (one-time, when first enabling this workflow):
#   1. Generate a strong random string (32+ chars).
#   2. Set it as a repo secret (if not already set by qc-cron):
#        gh secret set CRON_SECRET --body "<value>"
#   3. Mirror to Cloudflare Pages:
#        wrangler pages secret put CRON_SECRET --project-name hookka-erp-testing
#   4. Re-deploy Pages so the new env var is live.
on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:

# Hard-cap the job to a single run at a time. If a previous tick is still
# running (Resend lag, cold-start, etc.), skip rather than overlap — the
# next tick is only 5 min away and the SQL drain is idempotent.
concurrency:
  group: email-outbox-drain
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/internal/process-email-outbox
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is empty. See workflow header for setup."
            exit 1
          fi

          # Capture status + body so a 4xx/5xx surfaces in the job log
          # rather than failing silently. 60s max-time covers cold start +
          # Resend round-trips for a 25-row batch.
          response=$(curl --silent --show-error --write-out '\nHTTP_STATUS:%{http_code}' \
            --max-time 60 \
            --request POST \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{}' \
            'https://hookka-erp-testing.pages.dev/api/internal/process-email-outbox')

          status=$(echo "$response" | tail -n1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')

          echo "Status: $status"
          echo "Body: $body"

          if [ "$status" -ne 200 ]; then
            echo "::error::drain failed with HTTP $status"
            exit 1
          fi
