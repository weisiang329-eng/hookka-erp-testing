name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - 'claude/**'
  # Also run on every PR targeting main so the required `deploy` status
  # check is produced regardless of the PR's source branch. Without this,
  # PRs from teammate / feature branches can never satisfy the branch
  # protection rule because no push event ever runs for them.
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      # canary deploy posts a comment on the PR with the preview URL
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Lint — non-blocking (P2). ~92 known errors documented in
      # docs/KNOWN-ISSUES.md (most: react-hooks/set-state-in-effect on the
      # idiomatic fetch->setState pattern, pre-React-Query migration). Until
      # those are triaged, lint as a deploy gate would fail every PR. Sprint
      # 6 flipped bundle-size to blocking (above) but kept lint non-blocking
      # — to be promoted once the known errors are cleared.
      - name: Lint (app)
        run: npm run lint:app
        continue-on-error: true

      - run: npm test

      # Strict build: runs `typecheck:app && vite build`. The typecheck gate
      # is BLOCKING — any TS error fails the deploy. Paired with `strict: true`
      # in tsconfig.app.json (TS.E), this is the graduated form of P1.6 in
      # docs/UPGRADE-CONTROL-BOARD.md: no `continue-on-error`, no opt-out.
      - run: npm run build:strict

      # Bundle size budget (P7.2) — temporarily non-blocking after the
      # foundation-rollup merge introduced a Windows-vs-Linux content-hash
      # length artifact (9 vs 8 chars splitting/merging the same stem
      # differently across platforms). The baseline written from a local
      # Windows build doesn't match what CI's Linux build emits. Re-flip
      # to blocking after regenerating the baseline cleanly from a CI run.
      # TODO: write a workflow step that snapshots baseline on `main`
      # pushes only, so this stays self-healing.
      - name: Bundle size budget
        run: node scripts/check-bundle-size.mjs
        continue-on-error: true

      # Deploy to Cloudflare Pages — main branch path. Preserves the
      # original behavior: pushes to `main` and `claude/**` deploy to
      # the matching branch slug on Pages.
      - name: Deploy to Cloudflare Pages (main / branch push)
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=hookka-erp-testing --branch=${{ github.ref_name }}

      # ---------------------------------------------------------------------
      # Phase B.5 — Canary deploy on PR.
      # ---------------------------------------------------------------------
      # Every PR targeting main also deploys to a unique Pages preview
      # branch (`canary-<PR_NUMBER>`). Cloudflare Pages auto-creates a
      # preview URL for each branch slug. Reviewers can click the URL in
      # the PR comment to test the change against real Pages
      # infrastructure (Hyperdrive, KV, R2 bindings — all live in
      # preview env).
      #
      # Promote-to-main = merge the PR. The push event on main re-runs
      # the workflow and deploys to the production branch.
      # ---------------------------------------------------------------------
      - name: Deploy to Cloudflare Pages (canary)
        if: github.event_name == 'pull_request'
        id: canary
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=hookka-erp-testing --branch=canary-${{ github.event.pull_request.number }}

      - name: Comment canary URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Cloudflare Pages preview URLs follow the pattern
            //   https://<branch-slug>.<project-name>.pages.dev
            // The branch slug is normalized: lowercase, dashes, no `/`.
            const prNumber = context.payload.pull_request.number;
            const branchSlug = `canary-${prNumber}`;
            const url = `https://${branchSlug}.hookka-erp-testing.pages.dev`;
            const marker = '<!-- canary-deploy-comment -->';
            const body = [
              marker,
              `### Canary deploy ready`,
              ``,
              `Preview URL: ${url}`,
              ``,
              `This branch is wired to the same Hyperdrive (→ Supabase Postgres) and KV bindings as production. (D1 binding was retired 2026-04-27; runtime data path is Postgres.) Test changes here before merging — see [docs/CANARY-DEPLOY.md](../blob/main/docs/CANARY-DEPLOY.md) for the review checklist.`,
              ``,
              `Promote to main = merge this PR.`,
            ].join("\n");

            // Update existing comment if present (avoid spam on every push)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      # ---------------------------------------------------------------------
      # [LEGACY-RETIRED 2026-04-27] D1 migrations step removed.
      # ---------------------------------------------------------------------
      # The runtime data layer is Supabase Postgres (via Hyperdrive); the D1
      # binding was removed in commit 7059259. The previous step here ran
      # `wrangler d1 migrations apply hookka-erp-db --remote` against an
      # instance with zero live traffic, which silently masked the fact
      # that migrations 0061-0063 never reached prod Supabase.
      #
      # Postgres migrations are applied manually for now — the operator
      # runs locally:
      #   npm run db:migrate:supabase:dry   # preview pending files
      #   npm run db:migrate:supabase       # apply to prod (uses _migrations
      #                                     # tracker table, idempotent)
      # against the prod DATABASE_URL in .dev.vars. See
      # migrations-postgres/README.md for the full flow.
      #
      # Why not re-add an automated CI step against Supabase?
      # 1. The Supabase prod DATABASE_URL would need to live as a CI secret.
      # 2. A failed migration mid-deploy is harder to recover than a
      #     deliberate operator-run apply.
      # 3. The new incremental tool is safe to re-run, so the operator can
      #     simply re-run after fixing a bad SQL file.
      # If/when this gets automated, wire `npm run db:migrate:supabase`
      # into a step gated on `github.ref == 'refs/heads/main'` with the
      # Supabase pooler URL exposed via `secrets.SUPABASE_DATABASE_URL`.
      - name: Schema migrations (manual reminder)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "::notice::Postgres migrations are applied manually. Run 'npm run db:migrate:supabase:dry' locally to preview, then 'npm run db:migrate:supabase' against prod DATABASE_URL. See migrations-postgres/README.md."

      # Guard against the "migration file landed but Supabase never got it"
      # bug we hit with three_pl_vehicles / three_pl_drivers (0063 sat in
      # migrations-postgres/ for days while the live DB was missing the
      # tables, so 3PL Save Vehicle silently failed with "relation does
      # not exist"). Parses every CREATE TABLE in migrations-postgres/*.sql,
      # diffs against information_schema.tables on Supabase, fails if any
      # migration-declared table is missing. Runs AFTER deploy so a deploy
      # is never gated on a schema diff that itself requires the deploy.
      # Push-to-main only - preview / PR builds skip this step.
      #
      # Set DATABASE_URL in repo secrets to the Supabase pooler URL
      # (port 6543) for this check to run.
      - name: Verify Postgres schema is in sync
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/check-schema-applied.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
